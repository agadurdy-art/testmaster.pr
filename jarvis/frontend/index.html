<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0e14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="JARVIS" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/jarvis-icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/jarvis-icon.svg" />
  <title>JARVIS · testmaster.pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing:border-box; }
    body { margin:0; background:#0a0e14; color:#cdd6f4; font-family:ui-sans-serif,system-ui,-apple-system,sans-serif; }
    button,input,textarea { font:inherit; }
    .glass { background:rgba(20,27,40,.78); backdrop-filter:blur(14px); border:1px solid rgba(120,160,255,.12); }
    .glow { box-shadow:0 0 18px rgba(80,160,255,.18); }
    .scroll::-webkit-scrollbar{width:8px}.scroll::-webkit-scrollbar-thumb{background:#1e2a44;border-radius:8px}
    @keyframes pulse2{0%,100%{opacity:.4}50%{opacity:1}} .live{animation:pulse2 1.2s ease-in-out infinite}
    .safe-top { padding-top:env(safe-area-inset-top); }
    .safe-bottom { padding-bottom:max(.75rem,env(safe-area-inset-bottom)); }
    @media (max-width:767px) {
      .desktop-only { display:none!important; }
      .mobile-fill { min-height:calc(100dvh - 116px); }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import { h, render } from "https://esm.sh/preact@10.23.2";
    import { useState, useEffect, useRef, useCallback } from "https://esm.sh/preact@10.23.2/hooks";
    import htm from "https://esm.sh/htm@3.1.1";
    const html = htm.bind(h);

    const TOKEN = localStorage.getItem("jarvis_token") || "";
    const authHeaders = TOKEN ? { Authorization: "Bearer " + TOKEN } : {};
    const PLATFORMS = ["instagram","facebook","tiktok","x","youtube","linkedin","zalo"];
    const PLATFORM_LABEL = {instagram:"Instagram",facebook:"Facebook",tiktok:"TikTok",x:"X",youtube:"YouTube",linkedin:"LinkedIn",zalo:"Zalo"};

    async function api(path, options={}) {
      const headers = { ...authHeaders, ...(options.headers || {}) };
      const response = await fetch(path, { ...options, headers });
      if (response.status === 401) throw new Error("unauthorized");
      if (!response.ok) {
        let message = `İstek başarısız (${response.status})`;
        try { message = (await response.json()).detail || message; } catch {}
        throw new Error(message);
      }
      if (response.status === 204) return null;
      return response.json();
    }

    function Login() {
      const [val, setVal] = useState("");
      const save = () => {
        if (!val.trim()) return;
        localStorage.setItem("jarvis_token", val.trim());
        location.reload();
      };
      return html`<div class="min-h-screen safe-top safe-bottom flex items-center justify-center p-5">
        <div class="glass glow rounded-2xl p-7 w-full max-w-sm text-center">
          <div class="text-2xl font-bold tracking-widest text-sky-300 mb-1">J.A.R.V.I.S</div>
          <div class="text-xs text-slate-500 mb-6">erişim anahtarı gerekli</div>
          <input type="password" value=${val} onInput=${e=>setVal(e.target.value)}
            onKeyDown=${e=>{if(e.key==="Enter")save();}} placeholder="JARVIS_TOKEN"
            class="w-full bg-slate-900/70 rounded-xl px-4 py-3 outline-none focus:ring-1 ring-sky-600 text-sm mb-3" />
          <button onClick=${save} class="w-full py-3 rounded-xl bg-sky-600 hover:bg-sky-500 text-sm font-medium">Gir</button>
        </div>
      </div>`;
    }

    function useTTS() {
      const queue = useRef([]); const playing = useRef(false);
      return useCallback(async (text) => {
        queue.current.push(text);
        if (playing.current) return;
        playing.current = true;
        while (queue.current.length) {
          const t = queue.current.shift();
          try {
            const r = await fetch("/api/tts", { method:"POST",
              headers:{ "Content-Type":"application/json", ...authHeaders },
              body:JSON.stringify({text:t}) });
            if (!r.ok) continue;
            const blob = await r.blob();
            await new Promise(res => {
              const url=URL.createObjectURL(blob), audio=new Audio(url);
              audio.onended=()=>{URL.revokeObjectURL(url);res();};
              audio.onerror=()=>{URL.revokeObjectURL(url);res();};
              audio.play().catch(res);
            });
          } catch {}
        }
        playing.current = false;
      }, []);
    }

    const ROLE_COLOR={orchestrator:"text-amber-300",gate:"text-rose-300",build:"text-sky-300",audit:"text-emerald-300",localization:"text-fuchsia-300"};
    const EV_STYLE={agent:"text-amber-300",tool:"text-slate-400",tool_result:"text-slate-500",text:"text-slate-200",result:"text-emerald-300",error:"text-rose-400",system:"text-sky-400",started:"text-sky-300",done:"text-slate-500"};

    function ControlRoom({roster, lastResponse, onSaveDraft}) {
      const [agent,setAgent]=useState("");
      const [command,setCommand]=useState("");
      const [events,setEvents]=useState([]);
      const [running,setRunning]=useState(false);
      const [sessionId,setSessionId]=useState(null);
      const [voiceOut,setVoiceOut]=useState(true);
      const [listening,setListening]=useState(false);
      const [cost,setCost]=useState(0);
      const wsRef=useRef(null), logRef=useRef(null), recRef=useRef(null), textBuf=useRef("");
      const speak=useTTS();

      useEffect(()=>{if(logRef.current)logRef.current.scrollTop=logRef.current.scrollHeight;},[events]);
      const push=e=>setEvents(prev=>[...prev,e]);
      const run=useCallback(()=>{
        if(!command.trim()||running)return;
        const cmd=command.trim();
        push({type:"started",text:"› "+cmd}); setRunning(true); textBuf.current="";
        const proto=location.protocol==="https:"?"wss":"ws";
        const ws=new WebSocket(`${proto}://${location.host}/ws/run`); wsRef.current=ws;
        ws.onopen=()=>ws.send(JSON.stringify({command:cmd,agent:agent||null,session_id:sessionId,token:TOKEN,speak:voiceOut}));
        ws.onmessage=m=>{
          const ev=JSON.parse(m.data);
          if(ev.session_id)setSessionId(ev.session_id);
          if(ev.type==="say"){if(voiceOut)speak(ev.text);return;}
          if(ev.type==="text"){
            textBuf.current+=ev.text;
            lastResponse.current=textBuf.current;
            setEvents(prev=>{
              const last=prev[prev.length-1];
              if(last&&last.type==="text"&&last._stream){const cp=[...prev];cp[cp.length-1]={...last,text:textBuf.current};return cp;}
              return [...prev,{type:"text",text:textBuf.current,_stream:true}];
            });
            return;
          }
          if(ev.type==="result"&&ev.total_cost_usd)setCost(c=>c+ev.total_cost_usd);
          if(ev.type==="done")setRunning(false);
          push(ev);
        };
        ws.onclose=()=>setRunning(false);
        ws.onerror=()=>{push({type:"error",message:"connection error"});setRunning(false);};
        setCommand("");
      },[command,agent,sessionId,running,voiceOut,speak]);

      const mic=useCallback(()=>{
        const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
        if(!SR){alert("Bu tarayıcı ses tanımayı desteklemiyor.");return;}
        if(listening){recRef.current?.stop();return;}
        const rec=new SR();recRef.current=rec;rec.lang="tr-TR";rec.interimResults=true;rec.continuous=false;
        rec.onresult=e=>setCommand(Array.from(e.results).map(r=>r[0].transcript).join(""));
        rec.onend=()=>setListening(false);rec.onerror=()=>setListening(false);rec.start();setListening(true);
      },[listening]);
      const newSession=()=>{setSessionId(null);setEvents([]);textBuf.current="";lastResponse.current="";};
      const squads={product:roster.filter(a=>a.squad==="product"),marketing:roster.filter(a=>a.squad==="marketing")};

      return html`<div class="flex flex-1 min-h-0 mobile-fill">
        <aside class="desktop-only w-64 glass overflow-y-auto scroll p-3 space-y-3 border-r border-sky-900/40">
          ${["product","marketing"].map(sq=>html`<div>
            <div class="text-[10px] uppercase tracking-widest text-slate-500 mb-1">${sq}</div>
            ${squads[sq].map(a=>html`<button onClick=${()=>setAgent(agent===a.name?"":a.name)}
              class="w-full text-left px-2 py-1.5 rounded mb-1 text-xs ${agent===a.name?"bg-sky-900/50 glow":"hover:bg-slate-800/50"}">
              <div class="font-medium ${ROLE_COLOR[a.role]||"text-slate-300"}">${a.name}</div>
              <div class="text-[10px] text-slate-500">${a.role} · ${a.model}</div>
            </button>`)}
          </div>`)}
        </aside>
        <main class="flex-1 flex flex-col min-w-0">
          <div class="md:hidden glass px-3 py-2 border-b border-sky-900/40">
            <select value=${agent} onChange=${e=>setAgent(e.target.value)}
              class="w-full bg-slate-900 rounded-lg px-3 py-2 text-sm">
              <option value="">Auto — JARVIS yönlendirsin</option>
              ${roster.map(a=>html`<option value=${a.name}>${a.name}</option>`)}
            </select>
          </div>
          <div ref=${logRef} class="scroll flex-1 overflow-y-auto p-4 space-y-1 text-sm font-mono">
            ${events.length===0&&html`<div class="text-slate-600 text-center mt-20 px-6">
              Bir komut yaz veya sesle söyle. Sosyal içerik için <b>social-media-manager</b> seçilebilir.
            </div>`}
            ${events.map((e,i)=>html`<div key=${i} class="${EV_STYLE[e.type]||"text-slate-300"} whitespace-pre-wrap break-words">
              ${e.type==="agent"?`▸ ${e.agent}${e.label?": "+e.label:""}`
                :e.type==="tool"?`  · ${e.tool} ${e.summary||""}`
                :e.type==="tool_result"?`    ↳ ${(e.text||"").slice(0,180)}`
                :e.type==="result"?`■ tamam${e.total_cost_usd?` · $${e.total_cost_usd.toFixed(3)}`:""}${e.is_error?" · HATA":""}`
                :e.type==="error"?`✖ ${e.message||"error"}`
                :e.type==="started"?e.text:e.type==="system"?`[${e.subtype||"system"} ${e.model||""}]`:e.text||""}
            </div>`)}
            ${running&&html`<div class="text-sky-400 live">▍ working…</div>`}
          </div>
          <div class="glass p-3 border-t border-sky-900/40 safe-bottom">
            ${lastResponse.current&&html`<button onClick=${()=>onSaveDraft(lastResponse.current)}
              class="mb-2 w-full md:w-auto px-4 py-2 rounded-lg bg-emerald-700 hover:bg-emerald-600 text-sm">
              Sonucu Social Studio'ya kaydet
            </button>`}
            <div class="flex items-center gap-2">
              <button onClick=${mic} class="w-11 h-11 rounded-full flex-shrink-0 ${listening?"bg-rose-600 live":"bg-slate-800"}">🎤</button>
              <input value=${command} onInput=${e=>setCommand(e.target.value)} onKeyDown=${e=>{if(e.key==="Enter")run();}}
                placeholder=${agent?`${agent}'a komut…`:"JARVIS'e komut…"}
                class="flex-1 min-w-0 bg-slate-900/70 rounded-xl px-4 py-3 outline-none focus:ring-1 ring-sky-600 text-sm" />
              <button onClick=${run} disabled=${running||!command.trim()}
                class="px-4 py-3 rounded-xl bg-sky-600 disabled:opacity-40 text-sm font-medium">${running?"…":"Gönder"}</button>
            </div>
            <div class="mt-2 flex justify-between text-[10px] text-slate-500">
              <span>≈ $${cost.toFixed(3)} · ${sessionId?"aktif oturum":"yeni oturum"}</span>
              <span><button onClick=${newSession}>↺ reset</button> · <label><input type="checkbox" checked=${voiceOut} onChange=${e=>setVoiceOut(e.target.checked)} /> voice</label></span>
            </div>
          </div>
        </main>
      </div>`;
    }

    function MediaCard({draftId,item,onDelete}) {
      const [url,setUrl]=useState("");
      useEffect(()=>{
        let active=true, objectUrl="";
        fetch(`/api/social/drafts/${draftId}/media/${item.id}`,{headers:authHeaders})
          .then(r=>{if(!r.ok)throw new Error();return r.blob();})
          .then(blob=>{if(active){objectUrl=URL.createObjectURL(blob);setUrl(objectUrl);}})
          .catch(()=>{});
        return()=>{active=false;if(objectUrl)URL.revokeObjectURL(objectUrl);};
      },[draftId,item.id]);
      const download=async()=>{
        const r=await fetch(`/api/social/drafts/${draftId}/media/${item.id}?download=true`,{headers:authHeaders});
        if(!r.ok)return alert("Dosya indirilemedi.");
        const blob=await r.blob(), a=document.createElement("a"), href=URL.createObjectURL(blob);
        a.href=href;a.download=item.original_name||item.filename;document.body.appendChild(a);a.click();a.remove();
        setTimeout(()=>URL.revokeObjectURL(href),1000);
      };
      return html`<div class="glass rounded-xl overflow-hidden">
        <div class="aspect-video bg-slate-950 flex items-center justify-center overflow-hidden">
          ${!url?html`<span class="text-xs text-slate-600">yükleniyor…</span>`
            :item.content_type.startsWith("image/")?html`<img src=${url} class="w-full h-full object-contain" />`
            :item.content_type.startsWith("video/")?html`<video src=${url} controls playsinline class="w-full h-full object-contain"></video>`
            :item.content_type.startsWith("audio/")?html`<audio src=${url} controls class="w-11/12"></audio>`
            :html`<span class="text-4xl">📄</span>`}
        </div>
        <div class="p-2">
          <div class="text-xs truncate" title=${item.original_name}>${item.original_name}</div>
          <div class="flex gap-2 mt-2">
            <button onClick=${download} class="flex-1 text-xs py-1.5 rounded bg-slate-800">İndir</button>
            <button onClick=${onDelete} class="px-3 text-xs py-1.5 rounded bg-rose-950 text-rose-300">Sil</button>
          </div>
        </div>
      </div>`;
    }

    function SocialStudio({initialCaption,onInitialUsed}) {
      const [drafts,setDrafts]=useState([]);
      const [selectedId,setSelectedId]=useState(null);
      const [draft,setDraft]=useState(null);
      const [busy,setBusy]=useState(false);
      const [notice,setNotice]=useState("");
      const fileRef=useRef(null);
      const flash=msg=>{setNotice(msg);setTimeout(()=>setNotice(""),2500);};
      const load=useCallback(async(select)=>{
        const data=await api("/api/social/drafts");
        setDrafts(data.drafts||[]);
        const id=select||selectedId;
        if(id){
          const found=(data.drafts||[]).find(d=>d.id===id);
          setDraft(found||null);setSelectedId(found?id:null);
        }
      },[selectedId]);
      useEffect(()=>{load().catch(e=>flash(e.message));},[]);
      useEffect(()=>{
        if(!initialCaption)return;
        create(initialCaption).finally(onInitialUsed);
      },[initialCaption]);
      const create=async(caption="")=>{
        setBusy(true);
        try{
          const item=await api("/api/social/drafts",{method:"POST",headers:{"Content-Type":"application/json"},
            body:JSON.stringify({title:caption?"JARVIS social output":"Yeni sosyal taslak",caption,source:caption?"jarvis-agent":"manual"})});
          await load(item.id);setSelectedId(item.id);setDraft(item);flash("Taslak oluşturuldu.");
        }catch(e){flash(e.message);}finally{setBusy(false);}
      };
      const select=async id=>{setSelectedId(id);setDraft(await api(`/api/social/drafts/${id}`));};
      const save=async()=>{
        if(!draft)return;setBusy(true);
        try{
          const saved=await api(`/api/social/drafts/${draft.id}`,{method:"PATCH",headers:{"Content-Type":"application/json"},
            body:JSON.stringify({title:draft.title,caption:draft.caption,hashtags:draft.hashtags,platforms:draft.platforms,notes:draft.notes,status:draft.status})});
          setDraft(saved);await load(saved.id);flash("Kaydedildi.");
        }catch(e){flash(e.message);}finally{setBusy(false);}
      };
      const remove=async()=>{
        if(!draft||!confirm("Bu taslak ve medyaları silinsin mi?"))return;
        await api(`/api/social/drafts/${draft.id}`,{method:"DELETE"});setDraft(null);setSelectedId(null);await load();flash("Taslak silindi.");
      };
      const upload=async files=>{
        if(!draft||!files?.length)return;setBusy(true);
        try{
          for(const file of files){
            const form=new FormData();form.append("media",file);
            await api(`/api/social/drafts/${draft.id}/media`,{method:"POST",body:form});
          }
          const fresh=await api(`/api/social/drafts/${draft.id}`);setDraft(fresh);await load(fresh.id);flash("Medya eklendi.");
        }catch(e){flash(e.message);}finally{setBusy(false);if(fileRef.current)fileRef.current.value="";}
      };
      const deleteMedia=async id=>{
        if(!confirm("Bu medya silinsin mi?"))return;
        await api(`/api/social/drafts/${draft.id}/media/${id}`,{method:"DELETE"});
        const fresh=await api(`/api/social/drafts/${draft.id}`);setDraft(fresh);await load(fresh.id);
      };
      const postText=()=>`${draft?.caption||""}${draft?.hashtags?.length?`\n\n${draft.hashtags.map(t=>"#"+t).join(" ")}`:""}`.trim();
      const copy=async()=>{await navigator.clipboard.writeText(postText());flash("Metin kopyalandı.");};
      const downloadText=()=>{
        const blob=new Blob([postText()],{type:"text/plain;charset=utf-8"}),a=document.createElement("a"),url=URL.createObjectURL(blob);
        a.href=url;a.download=`${(draft.title||"social-post").replace(/[^a-z0-9]+/gi,"-").toLowerCase()}.txt`;a.click();setTimeout(()=>URL.revokeObjectURL(url),1000);
      };
      const share=async()=>{
        if(!draft)return;
        setBusy(true);
        try{
          const files=[];
          for(const item of draft.media||[]){
            const response=await fetch(`/api/social/drafts/${draft.id}/media/${item.id}`,{headers:authHeaders});
            if(response.ok)files.push(new File([await response.blob()],item.original_name||item.filename,{type:item.content_type}));
          }
          const payload={title:draft.title,text:postText()};
          if(files.length&&navigator.canShare?.({files}))payload.files=files;
          if(navigator.share){
            await navigator.share(payload);
            const fresh=await api(`/api/social/drafts/${draft.id}`,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({status:"shared"})});
            setDraft(fresh);await load(fresh.id);flash("Paylaşım menüsü açıldı.");
          }else{await copy();flash("Paylaşım desteklenmiyor; metin kopyalandı.");}
        }catch(e){if(e.name!=="AbortError")flash(e.message||"Paylaşım açılamadı.");}finally{setBusy(false);}
      };
      const togglePlatform=p=>{
        const current=draft.platforms||[];
        setDraft({...draft,platforms:current.includes(p)?current.filter(x=>x!==p):[...current,p]});
      };
      const setTags=value=>setDraft({...draft,hashtags:value.split(/[\s,]+/).map(x=>x.replace(/^#/,"")).filter(Boolean)});

      return html`<div class="flex-1 min-h-0 flex mobile-fill">
        <aside class="${draft?"desktop-only":""} w-full md:w-80 glass border-r border-sky-900/40 overflow-y-auto scroll p-3">
          <button disabled=${busy} onClick=${()=>create()} class="w-full py-3 rounded-xl bg-emerald-700 hover:bg-emerald-600 font-medium mb-3">＋ Yeni taslak</button>
          ${drafts.length===0&&html`<div class="text-center text-sm text-slate-600 p-8">Henüz sosyal taslak yok.</div>`}
          ${drafts.map(item=>html`<button onClick=${()=>select(item.id)}
            class="w-full text-left glass rounded-xl p-3 mb-2 ${selectedId===item.id?"ring-1 ring-sky-500":""}">
            <div class="flex justify-between gap-2"><b class="text-sm truncate">${item.title}</b><span class="text-[10px] text-slate-500">${item.status}</span></div>
            <div class="text-xs text-slate-500 line-clamp-2 mt-1">${item.caption||"Boş taslak"}</div>
            <div class="text-[10px] text-sky-400 mt-2">${(item.platforms||[]).map(p=>PLATFORM_LABEL[p]).join(" · ")||"Platform seçilmedi"} · ${(item.media||[]).length} medya</div>
          </button>`)}
        </aside>
        <main class="${draft?"":"desktop-only"} flex-1 min-w-0 overflow-y-auto scroll p-3 md:p-5 safe-bottom">
          ${notice&&html`<div class="fixed top-16 left-1/2 -translate-x-1/2 z-50 bg-sky-700 text-white rounded-full px-4 py-2 text-sm shadow-xl">${notice}</div>`}
          ${!draft?html`<div class="h-full flex items-center justify-center text-slate-600">Bir taslak seçin veya oluşturun.</div>`
          :html`<div class="max-w-4xl mx-auto space-y-4">
            <div class="flex gap-2 items-center">
              <button onClick=${()=>{setDraft(null);setSelectedId(null);}} class="md:hidden px-3 py-2 rounded-lg bg-slate-800">←</button>
              <input value=${draft.title} onInput=${e=>setDraft({...draft,title:e.target.value})}
                class="flex-1 min-w-0 bg-slate-900 rounded-xl px-4 py-3 text-lg font-semibold outline-none focus:ring-1 ring-sky-600" />
              <button disabled=${busy} onClick=${save} class="px-4 py-3 rounded-xl bg-sky-600 disabled:opacity-40">Kaydet</button>
            </div>
            <div class="glass rounded-2xl p-4">
              <div class="text-xs uppercase tracking-widest text-slate-500 mb-2">Platformlar</div>
              <div class="flex flex-wrap gap-2">${PLATFORMS.map(p=>html`<button onClick=${()=>togglePlatform(p)}
                class="px-3 py-2 rounded-full text-xs ${draft.platforms?.includes(p)?"bg-sky-600 text-white":"bg-slate-800 text-slate-400"}">${PLATFORM_LABEL[p]}</button>`)}</div>
            </div>
            <div class="glass rounded-2xl p-4">
              <label class="text-xs uppercase tracking-widest text-slate-500">Gönderi metni</label>
              <textarea value=${draft.caption} onInput=${e=>setDraft({...draft,caption:e.target.value})} rows="10"
                class="mt-2 w-full bg-slate-950/70 rounded-xl p-3 outline-none focus:ring-1 ring-sky-600 resize-y"></textarea>
              <label class="block text-xs uppercase tracking-widest text-slate-500 mt-4">Hashtagler</label>
              <input value=${(draft.hashtags||[]).map(t=>"#"+t).join(" ")} onInput=${e=>setTags(e.target.value)}
                placeholder="#ielts #english" class="mt-2 w-full bg-slate-950/70 rounded-xl px-3 py-3 outline-none focus:ring-1 ring-sky-600" />
              <div class="grid grid-cols-2 md:grid-cols-4 gap-2 mt-4">
                <button onClick=${copy} class="py-3 rounded-xl bg-slate-800">Metni kopyala</button>
                <button onClick=${downloadText} class="py-3 rounded-xl bg-slate-800">Metni indir</button>
                <button onClick=${share} disabled=${busy} class="col-span-2 py-3 rounded-xl bg-emerald-600 text-white font-semibold disabled:opacity-40">iPhone'da Paylaş</button>
              </div>
            </div>
            <div class="glass rounded-2xl p-4">
              <div class="flex items-center justify-between gap-3">
                <div><div class="text-xs uppercase tracking-widest text-slate-500">Medya</div><div class="text-xs text-slate-600 mt-1">JPG, PNG, WebP, GIF, MP4, MOV, WebM, MP3, M4A, WAV veya PDF</div></div>
                <button onClick=${()=>fileRef.current?.click()} class="px-4 py-2 rounded-xl bg-violet-700 whitespace-nowrap">＋ Ekle</button>
                <input ref=${fileRef} type="file" multiple accept="image/*,video/*,audio/*,application/pdf" class="hidden" onChange=${e=>upload(e.target.files)} />
              </div>
              <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 mt-4">
                ${(draft.media||[]).map(item=>html`<${MediaCard} key=${item.id} draftId=${draft.id} item=${item} onDelete=${()=>deleteMedia(item.id)} />`)}
              </div>
            </div>
            <div class="glass rounded-2xl p-4">
              <label class="text-xs uppercase tracking-widest text-slate-500">İç not</label>
              <textarea value=${draft.notes||""} onInput=${e=>setDraft({...draft,notes:e.target.value})} rows="3"
                class="mt-2 w-full bg-slate-950/70 rounded-xl p-3 outline-none focus:ring-1 ring-sky-600"></textarea>
              <div class="flex items-center justify-between mt-4">
                <select value=${draft.status} onChange=${e=>setDraft({...draft,status:e.target.value})} class="bg-slate-900 rounded-lg px-3 py-2 text-sm">
                  <option value="draft">Taslak</option><option value="ready">Paylaşıma hazır</option><option value="shared">Paylaşıldı</option><option value="archived">Arşiv</option>
                </select>
                <button onClick=${remove} class="text-sm text-rose-400">Taslağı sil</button>
              </div>
            </div>
          </div>`}
        </main>
      </div>`;
    }

    function App() {
      const [roster,setRoster]=useState([]);
      const [authed,setAuthed]=useState(null);
      const [socialOnly,setSocialOnly]=useState(false);
      const [view,setView]=useState(location.hash==="#social"?"social":"control");
      const [initialCaption,setInitialCaption]=useState("");
      const lastResponse=useRef("");
      useEffect(()=>{
        api("/api/health").then(async health=>{
          setSocialOnly(!!health.social_only);
          if(health.social_only){setView("social");setAuthed(true);return;}
          const data=await api("/api/agents");setRoster(data.agents||[]);setAuthed(true);
        })
          .catch(e=>setAuthed(e.message==="unauthorized"?false:true));
      },[]);
      useEffect(()=>{location.hash=view==="social"?"social":"";},[view]);
      const saveResult=text=>{setInitialCaption(text);setView("social");};
      if(authed===false)return html`<${Login}/>`;
      return html`<div class="h-[100dvh] flex flex-col safe-top">
        <header class="glass flex items-center gap-3 px-4 md:px-5 py-3 border-b border-sky-900/40">
          <button onClick=${()=>!socialOnly&&setView("control")} class="text-lg md:text-xl font-bold tracking-widest text-sky-300">J.A.R.V.I.S</button>
          <div class="desktop-only text-xs text-slate-500">testmaster.pro control room</div>
          <nav class="ml-auto flex p-1 rounded-xl bg-slate-950/60">
            ${!socialOnly&&html`<button onClick=${()=>setView("control")} class="px-3 py-2 rounded-lg text-xs ${view==="control"?"bg-sky-700 text-white":"text-slate-400"}">Agentlar</button>`}
            <button onClick=${()=>setView("social")} class="px-3 py-2 rounded-lg text-xs ${view==="social"?"bg-emerald-700 text-white":"text-slate-400"}">Social Studio</button>
          </nav>
        </header>
        ${view==="control"
          ?html`<${ControlRoom} roster=${roster} lastResponse=${lastResponse} onSaveDraft=${saveResult}/>`
          :html`<${SocialStudio} initialCaption=${initialCaption} onInitialUsed=${()=>setInitialCaption("")}/>`}
      </div>`;
    }

    if("serviceWorker" in navigator)navigator.serviceWorker.register("/sw.js").catch(()=>{});
    render(html`<${App}/>`,document.getElementById("app"));
  </script>
</body>
</html>
