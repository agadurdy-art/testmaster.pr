        <script>
            // Request microphone permissions early
            window.addEventListener('DOMContentLoaded', () => {
                if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {

                    navigator.mediaDevices.enumerateDevices()
                        .then(devices => {

                            console.log('Audio devices available:', audioInputs.length);

                        .catch(err => console.log('Audio check:', err));

            });

        <!-- ElevenLabs Conversational AI Widget - AI Examiner for Speaking Test (logged-in users with credits) -->
        <div id="ielts-ace-examiner" style="display: none; position: fixed; bottom: 20px; right: 20px; z-index: 9999;">
            <elevenlabs-convai agent-id="agent_2701kbcd1n1xepyt59ckv9sdzrjf"></elevenlabs-convai>
        </div>
        
        <!-- ElevenLabs Conversational AI Widget - Level Test Agent for Landing Page (non-logged visitors, once per device) -->
        <div id="ielts-level-test-agent" style="display: none; position: fixed; bottom: 20px; right: 20px; z-index: 9999;">
            <elevenlabs-convai agent-id="agent_8701kctavvxafxk90czptrbg2p4r"></elevenlabs-convai>
        </div>
        
        <!-- ElevenLabs ConvAI widget — defer to idle so it doesn't compete
             with the React bundle for parse time. Widget is only used on
             logged-in surfaces (examiner) + landing level-test agent;
             nobody needs it during initial paint. -->
        <script>
            window.addEventListener('load', function () {
                var s = document.createElement('script');
                s.src = 'https://unpkg.com/@elevenlabs/convai-widget-embed';
                s.async = true;
                document.body.appendChild(s);
            });
        </script>
        <!-- PostHog — defer init until idle. The pre-existing inline blob
             ran synchronously and burned ~30ms of main-thread parse time
             on every page load. Deferring puts user feedback after their
             eyes hit pixels, not before. -->
        <script>
            window.addEventListener('load', function () {
                var initPosthog = function () {
                    var s = document.createElement('script');
                    s.async = true;
                    s.src = 'https://us-assets.i.posthog.com/static/array.js';
                    s.onload = function () {
                        if (window.posthog && window.posthog.init) {
                            window.posthog.init('phc_yJW1VjHGGwmCbbrtczfqqNxgBDbhlhOWcdzcIJEOTFE', {
                                api_host: 'https://us.i.posthog.com',
                                person_profiles: 'identified_only',
                            });
                        }
                    };
                    document.body.appendChild(s);
                };
                if ('requestIdleCallback' in window) {
                    window.requestIdleCallback(initPosthog, { timeout: 2000 });
                } else {
                    setTimeout(initPosthog, 1000);
                }
            });
        </script>
